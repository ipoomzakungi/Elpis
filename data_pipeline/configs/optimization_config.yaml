data:
  processed_path: data/processed/xauusd_m1_2024_to_now.parquet
  reports_dir: data/reports

backtest:
  initial_cash: 10000
  risk_per_trade: 0.01
  commission_per_unit: 0.0
  slippage_points: 2
  point_size: 0.01
  allow_short: true
  compound: false
  annualization_periods: 362880

strategy_defaults:
  point_size: 0.01

splits:
  train_start: "2024-01-01T00:00:00Z"
  train_end: "2025-01-01T00:00:00Z"
  validation_start: "2025-01-01T00:00:00Z"
  validation_end: "2026-01-01T00:00:00Z"
  test_start: "2026-01-01T00:00:00Z"

optimization:
  # Set to null for an exhaustive grid. The example grid is large, so the
  # default evaluates a deterministic spread of configs for local iteration.
  max_configs: 2000

data_quality_gate:
  enabled: true
  missing_minutes_max: 0
  duplicate_timestamps_max: 0
  suspicious_candles_max: 0
  max_spread_points: 300
  average_spread_points_max: 50

robustness:
  min_trades_per_split: 20
  min_profit_factor: 1.05
  max_drawdown_pct: 25
  test_collapse_tolerance: 0.5

scoring:
  validation_return: 1.0
  profit_factor: 2.0
  drawdown: 0.7
  trade_shortfall: 0.5
  stability: 0.4
  robustness_failure: 25.0

parameters:
  fast_ema: [10, 20, 30, 50]
  slow_ema: [50, 100, 150, 200]
  rsi_length: [7, 14, 21]
  rsi_buy_level: [25, 30, 35]
  rsi_sell_level: [65, 70, 75]
  atr_length: [7, 14, 21]
  stop_loss_atr: [1.0, 1.5, 2.0, 2.5]
  take_profit_atr: [1.0, 1.5, 2.0, 3.0]
  max_spread_points: [20, 30, 50]
