name: Validation

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Import backend app
        working-directory: backend
        run: python -c "from src.main import app; print('backend import ok')"

      - name: Run backend tests
        working-directory: backend
        run: pytest tests/ -q

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  artifact-guard:
    name: Generated artifact guard
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run artifact guard
        shell: pwsh
        run: ./scripts/check_generated_artifacts.ps1
